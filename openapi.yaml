components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    ProjectMemberId:
      in: path
      name: memberId
      required: true
      schema:
        type: string
        format: uuid
    BoardId:
      in: path
      name: boardId
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: string
        format: uuid
    MeetingId:
      in: path
      name: meetingId
      required: true
      schema:
        type: string
        format: uuid
    DashboardId:
      in: path
      name: dashboardId
      required: true
      schema:
        type: string
        format: uuid
    WidgetId:
      in: path
      name: widgetId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean

    RegisterRequest:
      type: object
      required: [username, email, password, full_name]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        full_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
