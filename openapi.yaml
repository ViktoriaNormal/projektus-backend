          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AdminUserResponse'
    delete:
      tags: [AdminUsers]
      summary: Delete user (admin)
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: Deleted

  # ─── Admin: Password Policy ─────────────────────────────────────────
  /admin/password-policy:
    get:
      tags: [AdminPasswordPolicy]
      summary: Get password policy (admin)
      responses:
        '200':
          description: Password policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_PasswordPolicy'
    put:
      tags: [AdminPasswordPolicy]
      summary: Update password policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordPolicyRequest'
      responses:
        '200':
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_PasswordPolicy'

  # ─── Admin: Project Templates ───────────────────────────────────────
  /admin/project-templates/references:
    get:
      tags: [AdminTemplates]
      summary: Get template references
      responses:
        '200':
          description: References
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ReferencesResponse'

  /admin/project-templates:
    get:
      tags: [AdminTemplates]
      summary: List project templates
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectTemplateListResponse'
    post:
      tags: [AdminTemplates]
      summary: Create project template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
      responses:
        '200':
          description: Created template
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectTemplateResponse'

  /admin/project-templates/{template_id}:
    get:
      tags: [AdminTemplates]
      summary: Get template details
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '200':
          description: Template details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectTemplateResponse'
    patch:
      tags: [AdminTemplates]
      summary: Update template
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
      responses:
        '200':
          description: Updated template
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectTemplateResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      responses:
        '204':
          description: Deleted

  /admin/project-templates/{template_id}/boards:
    post:
      tags: [AdminTemplates]
      summary: Create template board
      description: |
        Creates a new board in a template with default columns and all system
        task fields (`is_system: true`).

        System fields are determined by the template's project type (`scrum` /
        `kanban`). The "Приоритизация" field receives default `options` based on
        the provided `priority_type`, and "Оценка трудозатрат" gets a description
        matching the provided `estimation_unit`. The response includes all created
        system fields in `fields`.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateBoardRequest'
      responses:
        '200':
          description: Created board
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardResponse'

  /admin/project-templates/{template_id}/boards/reorder:
    patch:
      tags: [AdminTemplates]
      summary: Reorder template boards
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
      responses:
        '204':
          description: Reordered

  /admin/project-templates/{template_id}/boards/{board_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template board
      description: |
        Partially updates a template board. Only provided fields are changed.

        To clear `swimlane_group_by`, send `{ "swimlane_group_by": null }`.
        Omitting the field leaves the current value unchanged.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateBoardRequest'
      responses:
        '200':
          description: Updated board
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template board
      description: |
        Deletes a board from a template.

        Returns `400 DEFAULT_BOARD_DELETE` if the board has `is_default: true`.
        Returns `400 LAST_BOARD_DELETE` if this is the only board in the template.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Cannot delete — board is default or last remaining

  /admin/project-templates/{template_id}/boards/{board_id}/columns:
    post:
      tags: [AdminTemplates]
      summary: Create template board column
      description: |
        Creates a new column at the specified position.

        The `order` field works as an insertion index (like `Array.splice`):
        all existing columns with `order >=` the given value are shifted by +1.
        For example, if columns have orders 1, 2, 3, 4 and a new column is created
        with `order: 2`, the result is: new column at 2, old 2→3, 3→4, 4→5.

        Column order validation (`initial → in_progress → completed`) is **not**
        enforced on create — only on reorder and system_type update.

        Для колонок с `system_type = completed` установка `wip_limit` запрещена — 400.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateBoardColumnRequest'
      responses:
        '200':
          description: Created column
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardColumnResponse'

  /admin/project-templates/{template_id}/boards/{board_id}/columns/reorder:
    patch:
      tags: [AdminTemplates]
      summary: Reorder template columns
      description: |-
        Заблокированные колонки не могут быть перемещены (`COLUMN_LOCKED`).
        После перестановки проверяется порядок: `initial → in_progress → completed` (`INVALID_COLUMN_ORDER`).
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderColumnsRequest'
      responses:
        '204':
          description: Reordered
        '400':
          description: Column locked or invalid column order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/project-templates/{template_id}/boards/{board_id}/columns/{column_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template column
      description: |-
        Заблокированные колонки нельзя редактировать (`COLUMN_LOCKED`).
        При изменении `system_type` проверяется порядок: `initial → in_progress → completed` (`INVALID_COLUMN_ORDER`).

        Для колонок с `system_type = completed` установка `wip_limit` запрещена — 400.
        При смене `system_type` на `completed` WIP-лимит автоматически сбрасывается в null.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/ColumnIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateBoardColumnRequest'
      responses:
        '200':
          description: Updated column
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardColumnResponse'
        '400':
          description: Column locked or invalid column order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template column
      description: |-
        Удаляет колонку шаблона. После удаления порядок пересчитывается последовательно (1, 2, 3, ...).

        **Ограничения:**
        - Нельзя удалить заблокированную колонку (`COLUMN_LOCKED`)
        - На доске должна остаться хотя бы одна колонка каждого типа: `initial`, `in_progress`, `completed` (`INVALID_COLUMN_ORDER`)
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/ColumnIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Column locked or would violate minimum type requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/project-templates/{template_id}/boards/{board_id}/swimlanes:
    post:
      tags: [AdminTemplates]
      summary: Create template swimlane
      description: |-
        Для Scrum-шаблонов передача `wip_limit` запрещена — вернётся 400
        с кодом `SCRUM_WIP_NOT_ALLOWED`.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateBoardSwimlaneRequest'
      responses:
        '200':
          description: Created swimlane
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardSwimlaneResponse'
        '400':
          description: WIP limits not supported for Scrum template swimlanes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/project-templates/{template_id}/boards/{board_id}/swimlanes/reorder:
    patch:
      tags: [AdminTemplates]
      summary: Reorder template swimlanes
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderSwimlanesRequest'
      responses:
        '204':
          description: Reordered

  /admin/project-templates/{template_id}/boards/{board_id}/swimlanes/{swimlane_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template swimlane
      description: |-
        Для Scrum-шаблонов установка `wip_limit` запрещена — вернётся 400
        с кодом `SCRUM_WIP_NOT_ALLOWED`.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/SwimlaneIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateBoardSwimlaneRequest'
      responses:
        '200':
          description: Updated swimlane
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardSwimlaneResponse'
        '400':
          description: WIP limits not supported for Scrum template swimlanes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template swimlane
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/SwimlaneIdPath'
      responses:
        '204':
          description: Deleted

  /admin/project-templates/{template_id}/boards/{board_id}/fields:
    post:
      tags: [AdminTemplates]
      summary: Create template custom field
      description: |
        Creates a new custom field for a template board.

        `sprint` and `sprint_list` field types are only allowed for Scrum templates.
        Kanban templates will receive `400 INVALID_FIELD_TYPE`.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateBoardCustomFieldRequest'
      responses:
        '200':
          description: Created field
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardCustomFieldResponse'
        '409':
          description: Field with this name already exists (DUPLICATE_NAME)

  /admin/project-templates/{template_id}/boards/{board_id}/fields/{field_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template custom field
      description: |
        Updates an existing field in a template board.

        **System field restrictions (`is_system: true`):**
        - In general, system fields cannot be edited -- attempting to change
          `name` or `is_required` returns `400 SYSTEM_FIELD`.
        - **Exception:** the system fields "Приоритизация" and "Оценка трудозатрат"
          allow updating the `options` array via PATCH.
          Example: `{ "options": ["Низкий", "Средний", "Высокий", "Критичный", "Блокер"] }`
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/FieldIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateBoardCustomFieldRequest'
      responses:
        '200':
          description: Updated field
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateBoardCustomFieldResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template custom field
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/FieldIdPath'
      responses:
        '204':
          description: Deleted

  /admin/project-templates/{template_id}/project-params:
    post:
      tags: [AdminTemplates]
      summary: Create template project param
      description: |
        Creates a new project parameter for a template.

        `sprint` and `sprint_list` field types are not allowed for project
        parameters — they are only valid for board task fields.
        Returns `400 INVALID_FIELD_TYPE` if attempted.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateProjectParamRequest'
      responses:
        '200':
          description: Created param
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateProjectParamResponse'
        '409':
          description: Param with this name already exists (DUPLICATE_NAME)

  /admin/project-templates/{template_id}/project-params/{param_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template project param
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/ParamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateProjectParamRequest'
      responses:
        '200':
          description: Updated param
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateProjectParamResponse'
    delete:
      tags: [AdminTemplates]
      summary: Delete template project param
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/ParamIdPath'
      responses:
        '204':
          description: Deleted

  /admin/project-templates/{template_id}/roles:
    post:
      tags: [AdminTemplates]
      summary: Create template role
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRoleRequest'
      responses:
        '200':
          description: Created role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateRoleResponse'

  /admin/project-templates/{template_id}/roles/{role_id}:
    patch:
      tags: [AdminTemplates]
      summary: Update template role
      description: |
        Роль с is_admin=true: можно менять только name и description.
        Попытка изменить permissions вернёт ошибку TEMPLATE_ADMIN_ROLE.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRoleRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TemplateRoleResponse'
        '400':
          description: Cannot change permissions of template admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: TEMPLATE_ADMIN_ROLE, message: "Нельзя изменять права доступа роли администратора проекта в шаблоне" }
    delete:
      tags: [AdminTemplates]
      summary: Delete template role
      description: |
        Роль с is_admin=true не может быть удалена из шаблона.
      parameters:
        - $ref: '#/components/parameters/TemplateIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Cannot delete template admin role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: TEMPLATE_ADMIN_ROLE, message: "Нельзя удалить роль администратора проекта из шаблона" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectIdPath:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberIdPath:
      name: member_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BoardIdPath:
      name: board_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ColumnIdPath:
      name: column_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SwimlaneIdPath:
      name: swimlane_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NoteIdPath:
      name: note_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FieldIdPath:
      name: field_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskIdPath:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SprintIdPath:
      name: sprint_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleIdPath:
      name: role_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ParamIdPath:
      name: param_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateIdPath:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MeetingIdPath:
      name: meeting_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BoardIdQuery:
      name: board_id
      in: query
      description: Board ID (defaults to the project's default board)
      required: false
      schema:
        type: string
        format: uuid
    AnalyticsFieldFilter:
      name: filter_{fieldId}
      in: query
      required: false
      description: |-
        **Analytics filter parameters.** Zero or more query parameters of the form
        `filter_{fieldId}=value1,value2` where `fieldId` is a UUID of a board field
        or the virtual key `__tags__`.

        - Comma-separated values are ORed (task matches if its field equals any listed value).
        - Multiple `filter_*` parameters are ANDed.
        - For multiselect / user_list / tags fields the task matches if at least one of its
          stored values overlaps with the filter values.
        - `filter___tags__=bug,feature` — filter by tag names.
        - When combined with `board_id`, tasks are first limited to the board, then filtered.
        - When absent, all tasks of the project are included (default behaviour).

        Example: `?filter_00000000-0000-0000-0001-000000000008=high,medium&filter___tags__=bug`
      schema:
        type: string
      style: form
      explode: true

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data: {}
        error:
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    SuccessResponse_Null:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          nullable: true
        error:
          nullable: true

    SuccessResponse_AuthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    SuccessResponse_User:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserResponse'

    SuccessResponse_Project:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ProjectResponse'

    SuccessResponse_Meeting:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeetingResponse'

    SuccessResponse_MeetingDetails:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeetingDetailsResponse'

    SuccessResponse_PasswordPolicy:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PasswordPolicyResponse'

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [username, email, password, full_name]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        full_name: { type: string }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string }
        new_password: { type: string }

    AuthResponse:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user: { $ref: '#/components/schemas/UserResponse' }
        roles:
          type: array
          items: { $ref: '#/components/schemas/RoleResponse' }

    # ── User ──
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string }
        full_name: { type: string }
        avatar_url: { type: string, nullable: true }
        position: { type: string, nullable: true }
        on_vacation: { type: boolean }
        is_sick: { type: boolean }
        alt_contact_channel: { type: string, nullable: true }
        alt_contact_info: { type: string, nullable: true }

    UpdateUserProfileRequest:
      type: object
      required: [full_name, email]
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        position: { type: string, nullable: true }
        on_vacation: { type: boolean }
        is_sick: { type: boolean }
        alt_contact_channel: { type: string, nullable: true }
        alt_contact_info: { type: string, nullable: true }

    # ── Permissions / Reference Data ──
    PermissionDefinitionResponse:
      type: object
      properties:
        code: { type: string }
        scope: { type: string, enum: [system, project] }
        name: { type: string }
        description: { type: string }

    # ── System Roles ──
    RolePermissionResponse:
      type: object
      properties:
        code: { type: string }
        access: { type: string, enum: [full, view, none] }

    RolePermissionRequest:
      type: object
      required: [code, access]
      properties:
        code: { type: string }
        access: { type: string, enum: [full, view, none] }

    RoleResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        is_admin: { type: boolean }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/RolePermissionResponse' }

    CreateRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/RolePermissionRequest' }

    UpdateRoleRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/RolePermissionRequest' }

    ProjectRoleResponse:
      type: object
      properties:
        project_id: { type: string, format: uuid }
        project_name: { type: string }
        roles:
          type: array
          items: { type: string }
        permissions:
          type: array
          items: { type: string }

    # ── Notifications ──
    NotificationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        event_type: { type: string }
        channel: { type: string }
        title: { type: string }
        body: { type: string, nullable: true }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
        read_at: { type: string, format: date-time, nullable: true }

    NotificationFeedResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/NotificationResponse' }
        unread_count: { type: integer }

    NotificationSettingResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        event_type: { type: string }
        in_system: { type: boolean }
        in_email: { type: boolean }
        reminder_offset_minutes: { type: integer, nullable: true }

    UpdateNotificationSettingItem:
      type: object
      required: [event_type]
      properties:
        event_type: { type: string }
        in_system: { type: boolean }
        in_email: { type: boolean }
        reminder_offset_minutes: { type: integer }

    # ── Meetings ──
    MeetingResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid, nullable: true }
        organizer_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        meeting_type: { type: string }
        location: { type: string, nullable: true }
        status: { type: string, enum: [active, cancelled] }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }

    MeetingDetailsResponse:
      allOf:
        - $ref: '#/components/schemas/MeetingResponse'
        - type: object
          properties:
            participants:
              type: array
              items: { $ref: '#/components/schemas/MeetingParticipantResponse' }

    MeetingParticipantResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        meeting_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, accepted, declined] }

    CreateMeetingRequest:
      type: object
      required: [name, location, start_time, end_time]
      properties:
        project_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        meeting_type: { type: string, nullable: true }
        location: { type: string }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }
        participant_ids:
          type: array
          items: { type: string, format: uuid }

    UpdateMeetingRequest:
      type: object
      properties:
        project_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        meeting_type: { type: string }
        location: { type: string, nullable: true }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time }

    # ── Projects ──
    ProjectResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        name: { type: string }
        description: { type: string }
        project_type: { type: string, enum: [scrum, kanban] }
        owner_id: { type: string, format: uuid }
        status: { type: string, enum: [active, archived, paused] }
        sprint_duration_weeks: { type: integer, enum: [1, 2, 3, 4], description: Длительность спринта в неделях (только Scrum) }
        incomplete_tasks_action: { type: string, enum: [backlog, next_sprint], default: backlog, description: "Действие с незавершёнными задачами при завершении спринта" }
        created_at: { type: string, format: date-time }
        owner: { $ref: '#/components/schemas/ProjectOwnerResponse' }

    ProjectOwnerResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        full_name: { type: string }
        avatar_url: { type: string, nullable: true }
        email: { type: string }

    CreateProjectRequest:
      type: object
      required: [name, project_type]
      properties:
        name: { type: string }
        description: { type: string }
        project_type: { type: string, enum: [scrum, kanban] }
        owner_id: { type: string, format: uuid, nullable: true }

    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [active, archived, paused] }
        owner_id: { type: string, format: uuid }
        sprint_duration_weeks: { type: integer, enum: [1, 2, 3, 4] }
        incomplete_tasks_action: { type: string, enum: [backlog, next_sprint], description: "Действие с незавершёнными задачами при завершении спринта" }

    ProjectReferencesResponse:
      type: object
      properties:
        column_system_types:
          type: array
          items: { $ref: '#/components/schemas/ReferenceColumnType' }
        field_types:
          type: array
          items: { $ref: '#/components/schemas/ReferenceFieldType' }
        estimation_units:
          type: array
          items: { $ref: '#/components/schemas/ReferenceAvailable' }
        priority_type_options:
          type: array
          items: { $ref: '#/components/schemas/ReferencePriorityType' }
        project_statuses:
          type: array
          items: { $ref: '#/components/schemas/ReferenceKeyName' }
        permission_areas:
          type: array
          items: { $ref: '#/components/schemas/ReferencePermissionArea' }
        access_levels:
          type: array
          items: { $ref: '#/components/schemas/ReferenceKeyName' }

    # ── Project Members ──
    ProjectMemberResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        roles:
          type: array
          description: Array of role UUIDs assigned to this member
          items: { type: string, format: uuid }

    AddMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id: { type: string, format: uuid }
        roles:
          type: array
          items: { type: string }

    UpdateMemberRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          items: { type: string }

    # ── Project Roles ──
    ProjectRoleDefinitionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        is_admin: { type: boolean }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/ProjectRoleDefPermissionResponse' }

    ProjectRoleDefPermissionResponse:
      type: object
      properties:
        area: { type: string }
        access: { type: string, enum: [full, view, none] }

    CreateProjectRoleRequest:
      type: object
      required: [name, permissions]
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/RolePermissionInput' }

    UpdateProjectRoleRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/RolePermissionInput' }

    RolePermissionInput:
      type: object
      required: [area, access]
      properties:
        area: { type: string }
        access: { type: string, enum: [full, view, none] }

    # ── Project Params ──
    ProjectParamResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        field_type: { type: string, enum: [text, number, datetime, select, multiselect, checkbox, user, user_list, sprint, sprint_list] }
        is_system: { type: boolean }
        is_required: { type: boolean }
        options:
          type: array
          items: { type: string }
        value: { type: string, nullable: true }

    CreateProjectParamRequest:
      type: object
      required: [name, field_type]
      description: |-
        Создание параметра проекта. Если передано `value`, оно валидируется по `field_type`:
        - **text** — любая строка
        - **number** — валидное число
        - **datetime** — ISO 8601 (RFC 3339), год в диапазоне 2000–2100
        - **checkbox** — только `"true"` или `"false"`
        - **select** — значение из `options`
        - **multiselect** — значения через запятую, каждое из `options`
        - **user** — UUID существующего пользователя
        - **user_list** — UUID через запятую, каждый — существующий пользователь
      properties:
        name: { type: string }
        field_type: { type: string, enum: [text, number, datetime, select, multiselect, checkbox, user, user_list, sprint, sprint_list] }
        is_required: { type: boolean }
        options:
          type: array
          items: { type: string }
        value: { type: string, nullable: true }

    UpdateProjectParamRequest:
      type: object
      description: |-
        Обновление параметра проекта. Значение `value` валидируется по `field_type`:
        - **text** — любая строка
        - **number** — валидное число
        - **datetime** — ISO 8601 (RFC 3339), год в диапазоне 2000–2100
        - **checkbox** — только `"true"` или `"false"`
        - **select** — значение из `options`
        - **multiselect** — значения через запятую, каждое из `options`
        - **user** — UUID существующего пользователя
        - **user_list** — UUID через запятую, каждый — существующий пользователь

        Если параметр обязательный, `value` не может быть null или пустой строкой.
      properties:
        name: { type: string }
        is_required: { type: boolean }
        options:
          type: array
          items: { type: string }
        value: { type: string, nullable: true }

    # ── Boards ──
    BoardResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        is_default: { type: boolean }
        order: { type: integer }
        priority_type: { type: string, enum: [priority, service_class] }
        estimation_unit: { type: string, enum: [story_points, time] }
        swimlane_group_by: { type: string, nullable: true }
