          type: array
          items: { type: string }

    # ── Tasks ──
    TaskResponse:
      type: object
      description: |-
        В контексте задач все поля owner/executor используют member_id (участник проекта), а не user_id.
        Для получения информации о пользователе используйте `owner_user_id` / `executor_user_id`.
        `column_id` может быть null для задач в бэклоге (до запуска спринта).
        При запуске спринта задачи получают column_id первой initial-колонки доски.
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        project_id: { type: string, format: uuid }
        board_id: { type: string, format: uuid }
        owner_member_id: { type: string, format: uuid, description: "ID участника проекта (members.id), назначившего задачу" }
        executor_member_id: { type: string, format: uuid, nullable: true, description: "ID участника проекта (members.id), исполнителя задачи" }
        owner_user_id: { type: string, format: uuid, nullable: true, description: "ID пользователя (users.id) владельца задачи — для GET /users/{id}" }
        executor_user_id: { type: string, format: uuid, nullable: true, description: "ID пользователя (users.id) исполнителя — для GET /users/{id}" }
        name: { type: string }
        description: { type: string, nullable: true }
        deadline: { type: string, format: date-time, nullable: true }
        column_id: { type: string, format: uuid, nullable: true }
        swimlane_id: { type: string, format: uuid, nullable: true }
        priority: { type: string, nullable: true }
        estimation: { type: string, nullable: true }
        progress: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        column_name: { type: string, nullable: true, description: Название колонки (LEFT JOIN, null если column_id is null) }
        column_system_type: { type: string, nullable: true, enum: [initial, in_progress, paused, completed, cancelled], description: Системный тип колонки }
        tags:
          type: array
          items: { $ref: '#/components/schemas/TagResponse' }

    CreateTaskRequest:
      type: object
      required: [project_id, owner_member_id, name]
      description: |-
        Для создания задачи нужен либо `board_id`, либо `column_id`, либо оба.
        - `board_id` без `column_id` → задача создаётся в начальной колонке доски.
        - `column_id` без `board_id` → `board_id` определяется автоматически из колонки.
        - Оба → задача сразу на доске в указанной колонке.

        Опциональные вложенные массивы (checklists, tags, watcher_member_ids, field_values, dependencies)
        позволяют создать задачу со всеми подсущностями атомарно в одной транзакции.
        Если массив не передан или пуст — поведение не меняется.
      properties:
        project_id: { type: string, format: uuid }
        board_id: { type: string, format: uuid, description: Доска для задачи }
        owner_member_id: { type: string, format: uuid }
        executor_member_id: { type: string, format: uuid, nullable: true }
        name: { type: string }
        description: { type: string }
        deadline: { type: string, format: date-time, nullable: true }
        column_id: { type: string, format: uuid, nullable: true, description: Опционально — колонка (null для бэклога) }
        swimlane_id: { type: string, format: uuid, nullable: true }
        priority: { type: string, nullable: true }
        estimation: { type: string, nullable: true }
        checklists:
          type: array
          description: Чек-листы, создаваемые вместе с задачей
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  required: [content]
                  properties:
                    content: { type: string }
                    is_checked: { type: boolean, default: false }
                    order: { type: integer }
        tags:
          type: array
          description: Имена тегов (создаются на доске если не существуют)
          items: { type: string }
        watcher_member_ids:
          type: array
          description: ID участников проекта, добавляемых как наблюдатели
          items: { type: string, format: uuid }
        field_values:
          type: array
          description: Значения кастомных полей доски
          items:
            type: object
            required: [field_id]
            properties:
              field_id: { type: string, format: uuid }
              value_text: { type: string, nullable: true }
              value_number: { type: string, nullable: true }
              value_datetime: { type: string, format: date-time, nullable: true }
        dependencies:
          type: array
          description: Связи с другими задачами
          items:
            type: object
            required: [depends_on_task_id, type]
            properties:
              depends_on_task_id: { type: string, format: uuid }
              type:
                type: string
                enum: [blocks, is_blocked_by, relates_to, parent, subtask]
        add_to_backlog:
          type: boolean
          default: false
          description: Если true — добавить задачу в бэклог продукта проекта после создания

    UpdateTaskRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        deadline: { type: string, format: date-time, nullable: true }
        executor_member_id: { type: string, format: uuid, nullable: true }
        column_id: { type: string, format: uuid }
        swimlane_id: { type: string, format: uuid, nullable: true }
        priority: { type: string, nullable: true }
        estimation: { type: string, nullable: true }

