  /sprints/{sprint_id}:
    get:
      tags: [Sprints]
      summary: Get sprint details
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      responses:
        '200':
          description: Sprint details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SprintResponse'
    patch:
      tags: [Sprints]
      summary: Update sprint
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSprintRequest'
      responses:
        '200':
          description: Updated sprint
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SprintResponse'
    delete:
      tags: [Sprints]
      summary: Delete sprint
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      responses:
        '204':
          description: Deleted

  /sprints/{sprint_id}/start:
    post:
      tags: [Sprints]
      summary: Start sprint
      description: |-
        Запускает спринт. Логика при запуске:
        1. **Валидация**: нельзя запустить, если уже есть active-спринт на проекте (400).
        2. **start_date** устанавливается = сегодняшняя дата (игнорируя дату из создания).
        3. **end_date** пересчитывается = start_date + sprint_duration_weeks проекта (fallback 2 недели).
        4. **Каскадный сдвиг**: все последующие planned-спринты с пересекающимися датами сдвигаются вперёд.
        5. Задачам без column_id назначается initial-колонка доски.
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      responses:
        '200':
          description: Started sprint
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SprintResponse'
        '400':
          description: |-
            Ошибки валидации:
            - Нельзя запустить завершённый спринт
            - Уже есть активный спринт на проекте

  /sprints/{sprint_id}/tasks:
    get:
      tags: [Sprints]
      summary: Get all tasks for a sprint
      description: Returns full task details for the given sprint, including completed sprints.
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      responses:
        '200':
          description: Sprint tasks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TaskResponse'

  /sprints/{sprint_id}/complete:
    post:
      tags: [Sprints]
      summary: Complete sprint
      description: |-
        Завершает спринт. Незавершённые задачи обрабатываются согласно `incomplete_tasks_action`:
        - `backlog` — задачи возвращаются в product backlog, column_id сбрасывается.
        - `next_sprint` — задачи переносятся в ближайший planned-спринт. Если planned-спринта нет — возвращается 400.
      parameters:
        - $ref: '#/components/parameters/SprintIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteSprintRequest'
      responses:
        '200':
          description: Completed sprint
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SprintResponse'
        '400':
          description: "incomplete_tasks_action=next_sprint, но нет следующего planned-спринта"

