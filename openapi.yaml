        - name: attachment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Attachment not found

  /tasks/attachments/{attachment_id}:
    delete:
      tags: [Attachments]
      summary: Delete attachment
      parameters:
        - name: attachment_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Deleted

  # ─── Tags ──────────────────────────────────────────────────────────
  /boards/{board_id}/tags:
    get:
      tags: [Tags]
      summary: List all tags on a board
      description: Returns all tags created on the board (for autocomplete suggestions).
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TagResponse'

  /boards/{board_id}/tasks/{task_id}/tags:
    post:
      tags: [Tags]
      summary: Add tag to task
      description: Creates a new tag on the board (if it doesn't exist) and assigns it to the task.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTagRequest'
      responses:
        '200':
          description: Tag added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TagResponse'
    put:
      tags: [Tags]
      summary: Replace all tags on a task
      description: Atomically replaces all tags on the task with the provided list.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetTaskTagsRequest'
      responses:
        '200':
          description: Tags replaced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TagResponse'

  /tasks/{task_id}/tags:
    get:
      tags: [Tags]
      summary: List tags of a task
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task tags
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TagResponse'

  /tasks/{task_id}/tags/{tag_id}:
    delete:
      tags: [Tags]
      summary: Remove tag from task
      description: Removes the tag from the task. If the tag is no longer used by any task, it is automatically deleted.
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
        - name: tag_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Tag removed

  # ─── Admin: System Roles ────────────────────────────────────────────
  /admin/roles:
    get:
      tags: [AdminRoles]
      summary: List system roles
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RoleResponse'
    post:
      tags: [AdminRoles]
      summary: Create system role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '200':
          description: Created role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'

  /admin/roles/{role_id}:
    get:
      tags: [AdminRoles]
      summary: Get system role
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
    put:
      tags: [AdminRoles]
      summary: Update system role
      description: |
        Системная роль с is_admin=true полностью неизменяема — нельзя менять имя, описание и права.
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
        '403':
          description: System admin role is immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: SYSTEM_ADMIN_ROLE, message: "Системная роль администратора неизменяема" }
    delete:
      tags: [AdminRoles]
      summary: Delete system role
      description: |
        Системная роль с is_admin=true не может быть удалена.
        Роль, назначенная хотя бы одному пользователю, не может быть удалена.
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Role has members assigned (ROLE_HAS_MEMBERS)
        '403':
          description: System admin role cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: SYSTEM_ADMIN_ROLE, message: "Нельзя удалить системную роль администратора" }

  # ─── Admin: Users ───────────────────────────────────────────────────
  /admin/users:
