    put:
      tags: [Tags]
      summary: Replace all tags on a task
      description: Atomically replaces all tags on the task with the provided list.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/TaskIdPath'
      requestBody:
        required: true
