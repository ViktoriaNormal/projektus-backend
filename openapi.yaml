                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TagResponse'

  /tasks/{task_id}/tags/{tag_id}:
    delete:
      tags: [Tags]
      summary: Remove tag from task
      description: Removes the tag from the task. If the tag is no longer used by any task, it is automatically deleted.
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
        - name: tag_id
          in: path
          required: true
