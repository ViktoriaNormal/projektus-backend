                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/BoardCustomFieldResponse'
    post:
      tags: [BoardFields]
      summary: Create custom field
      description: |
        Creates a new custom field (`is_system` is always `false`).
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardCustomFieldRequest'
