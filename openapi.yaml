openapi: 3.0.3
info:
  title: Projektus API
  description: |-
    Backend API for the Projektus project management system.

    ### PATCH-семантика для nullable-полей

    В PATCH-запросах для каждого nullable-поля (помеченного `nullable: true`) поддерживаются три состояния:

    | Тело запроса | Поведение |
    |---|---|
    | `{}` (поле отсутствует) | Значение не меняется |
    | `{ "field": null }` | Значение сбрасывается (записывается NULL в БД) |
    | `{ "field": "value" }` | Устанавливается новое значение |
  version: 2.0.0

servers:
  - url: /api/v1

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and password management
  - name: Users
    description: User profiles
  - name: Permissions
    description: System permission catalog
  - name: Notifications
    description: Notification feed and settings
  - name: Meetings
    description: Meeting management
  - name: Projects
    description: Project management
  - name: ProjectMembers
    description: Project membership
  - name: ProjectRoles
    description: Project-level role definitions
  - name: ProjectParams
    description: Project custom parameters
  - name: Boards
    description: Board management
  - name: Columns
    description: Board columns
  - name: Swimlanes
    description: Board swimlanes
  - name: Notes
    description: Column/swimlane notes
  - name: CustomFields
    description: Board custom fields
  - name: Tasks
    description: Task management
  - name: Sprints
    description: Sprint management
  - name: Backlog
    description: Product and sprint backlog
  - name: Tags
    description: Task tags
  - name: AdminRoles
    description: System role administration
  - name: AdminUsers
    description: User administration
  - name: AdminPasswordPolicy
    description: Password policy administration
  - name: AdminTemplates
    description: Project template administration
  - name: ScrumAnalytics
    description: Scrum analytics (velocity, burndown)
  - name: KanbanAnalytics
    description: Kanban analytics (CFD, cycle time, throughput, WIP)

paths:
  # ─── Auth ───────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'

  /auth/password-policy:
    get:
      tags: [Auth]
      summary: Get password policy (public)
      security: []
      responses:
        '200':
          description: Password policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_PasswordPolicy'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Permissions ────────────────────────────────────────────────────
  /permissions:
    get:
      tags: [Permissions]
      summary: List all permission definitions
      description: Returns permission definitions with code, scope, name, and description.
      responses:
        '200':
          description: Flat array of permission definitions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PermissionDefinitionResponse'

  # ─── Users ──────────────────────────────────────────────────────────
  /users:
    get:
      tags: [Users]
      summary: Search users
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserResponse'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user profile
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_User'
    patch:
      tags: [Users]
      summary: Update user profile
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_User'

  /users/{id}/avatar:
    put:
      tags: [Users]
      summary: Upload avatar
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated profile with avatar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_User'

  /users/{id}/roles:
    get:
      tags: [Users]
      summary: Get user system roles
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: System roles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RoleResponse'

  /users/{id}/project-roles:
    get:
      tags: [Users]
      summary: Get user project roles
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: Project roles
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectRoleResponse'

  # ─── Notifications ──────────────────────────────────────────────────
  /notifications:
    get:
      tags: [Notifications]
      summary: Get notification feed
      parameters:
        - name: unread_only
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Notification feed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/NotificationFeedResponse'

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200':
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'

  /notifications/{notification_id}/read:
    patch:
      tags: [Notifications]
      summary: Mark single notification as read
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'

  /notifications/settings:
    get:
      tags: [Notifications]
      summary: Get notification settings
      responses:
        '200':
          description: Notification settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/NotificationSettingResponse'
    put:
      tags: [Notifications]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/UpdateNotificationSettingItem'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/NotificationSettingResponse'

  # ─── Meetings ───────────────────────────────────────────────────────
  /meetings:
    get:
      tags: [Meetings]
      summary: List user meetings
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Meeting list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MeetingResponse'
    post:
      tags: [Meetings]
      summary: Create meeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeetingRequest'
      responses:
        '200':
          description: Created meeting with participants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_MeetingDetails'

  /meetings/{meeting_id}:
    get:
      tags: [Meetings]
      summary: Get meeting details
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: Meeting details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_MeetingDetails'
    patch:
      tags: [Meetings]
      summary: Update meeting
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeetingRequest'
      responses:
        '200':
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_MeetingDetails'

  /meetings/{meeting_id}/cancel:
    post:
      tags: [Meetings]
      summary: Cancel meeting
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: Cancelled meeting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Meeting'

  /meetings/{meeting_id}/participants:
    get:
      tags: [Meetings]
      summary: List meeting participants
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      responses:
        '200':
          description: Participants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          participants:
                            type: array
                            items:
                              $ref: '#/components/schemas/MeetingParticipantResponse'
    post:
      tags: [Meetings]
      summary: Add participants
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_ids]
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Added participants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          participants:
                            type: array
                            items:
                              $ref: '#/components/schemas/MeetingParticipantResponse'

  /meetings/{meeting_id}/response:
    post:
      tags: [Meetings]
      summary: Respond to meeting invitation
      parameters:
        - $ref: '#/components/parameters/MeetingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [accepted, declined]
      responses:
        '204':
          description: Response recorded

  # ─── Projects ───────────────────────────────────────────────────────
  /projects/references:
    get:
      tags: [Projects]
      summary: Get project references (enums, field types, etc.)
      responses:
        '200':
          description: References
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectReferencesResponse'

  /projects:
    get:
      tags: [Projects]
      summary: List user projects
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, paused]
        - name: project_type
          in: query
          schema:
            type: string
            enum: [scrum, kanban]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectResponse'
    post:
      tags: [Projects]
      summary: Create project
      description: |
        Creates a new project. The structure (boards, columns, swimlanes,
        fields, project params, roles) is fully copied from the corresponding
        template (scrum/kanban), including `is_default`, `is_system` flags,
        descriptions, options, and the admin role with its permissions.

        The creator is automatically added as the first member with the
        admin role from the template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Project'

  /projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project details
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Project'
    patch:
      tags: [Projects]
      summary: Update project
      description: |-
        При смене `owner_id` новый владелец автоматически добавляется в участники проекта с admin-ролью (если ещё не является участником).
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Project'
    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - name: confirm
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'

  # ─── Project Members ────────────────────────────────────────────────
  /projects/{project_id}/members:
    get:
      tags: [ProjectMembers]
      summary: List project members
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectMemberResponse'
    post:
      tags: [ProjectMembers]
      summary: Add member
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
      responses:
        '200':
          description: Added member
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectMemberResponse'

  /projects/{project_id}/members/{member_id}:
    delete:
      tags: [ProjectMembers]
      summary: Remove member
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MemberIdPath'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'
    patch:
      tags: [ProjectMembers]
      summary: Update member roles
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/MemberIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse_Null'

  # ─── Project Roles ──────────────────────────────────────────────────
  /projects/{project_id}/roles:
    get:
      tags: [ProjectRoles]
      summary: List project roles
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectRoleDefinitionResponse'
    post:
      tags: [ProjectRoles]
      summary: Create project role
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRoleRequest'
      responses:
        '200':
          description: Created role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectRoleDefinitionResponse'

  /projects/{project_id}/roles/{role_id}:
    patch:
      tags: [ProjectRoles]
      summary: Update project role
      description: |
        Updates name, description, or permissions of a project role.

        Permissions are updated partially (upsert): only the areas included
        in the request are changed, other areas keep their current access level.

        **Admin role (`is_admin: true`) restrictions:**
        - `name` and `description` CAN be changed.
        - `permissions` CANNOT be changed — returns `400 PROJECT_ADMIN_ROLE`
          with message "Нельзя изменять права доступа роли администратора проекта".
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRoleRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectRoleDefinitionResponse'
    delete:
      tags: [ProjectRoles]
      summary: Delete project role
      description: |
        Deletes a project role. The admin role (`is_admin: true`) cannot be
        deleted — returns `400 PROJECT_ADMIN_ROLE`. A role that still has
        members assigned cannot be deleted — returns `400 ROLE_HAS_MEMBERS`.
        At least one member must retain the admin role (`LAST_PROJECT_ADMIN`).
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Deleted

  # ─── Project Params ─────────────────────────────────────────────────
  /projects/{project_id}/params:
    get:
      tags: [ProjectParams]
      summary: List project params
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      responses:
        '200':
          description: Param list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ProjectParamResponse'
    post:
      tags: [ProjectParams]
      summary: Create project param
      description: |-
        Если передано `value`, оно валидируется по `field_type` (см. правила в описании схемы `CreateProjectParamRequest`).
        Создание с `is_required: true` без `value` допустимо — пользователь заполнит позже.
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectParamRequest'
      responses:
        '200':
          description: Created param
        '400':
          description: Validation error (value does not match field_type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectParamResponse'

  /projects/{project_id}/params/{param_id}:
    patch:
      tags: [ProjectParams]
      summary: Update project param
      description: |-
        Обновляет параметр проекта. Поддерживается три состояния для `value`:
        - поле отсутствует → значение не меняется
        - `"value": null` → значение сбрасывается (NULL)
        - `"value": "..."` → устанавливается новое значение

        **Валидация:**
        - Если параметр обязательный (`is_required = true`), `value` не может быть пустым или null.
        - Если `is_required` устанавливается в `true`, а текущее `value` пустое — ошибка 400.
        - Новое `value` валидируется по `field_type` параметра (см. правила в описании схемы).
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/ParamIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectParamRequest'
      responses:
        '200':
          description: Updated param
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ProjectParamResponse'
        '400':
          description: |-
            Validation error. Possible reasons:
            - Required param cannot have empty value
            - Value does not match field_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [ProjectParams]
      summary: Delete project param
      parameters:
        - $ref: '#/components/parameters/ProjectIdPath'
        - $ref: '#/components/parameters/ParamIdPath'
      responses:
        '204':
          description: Deleted

