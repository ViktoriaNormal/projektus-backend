  # ─── Columns ────────────────────────────────────────────────────────
  /boards/{board_id}/columns:
    get:
      tags: [Columns]
      summary: List columns
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
      responses:
        '200':
          description: Column list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ColumnResponse'
    post:
      tags: [Columns]
      summary: Create column
      description: |-
        Создаёт колонку на указанной позиции `order` (splice-вставка):
        все существующие колонки с `order >=` указанного сдвигаются на +1.

        После вставки проверяется порядок типов колонок: `initial → in_progress → completed`.
        При нарушении — 400 с кодом `INVALID_COLUMN_ORDER`.

        Для колонок с `system_type = completed` установка `wip_limit` запрещена — 400.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
      responses:
        '200':
          description: Created column
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ColumnResponse'
        '400':
          description: Invalid column order or invalid systemType
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /boards/{board_id}/columns/reorder:
    patch:
      tags: [Columns]
      summary: Reorder columns
      description: |-
        Изменяет порядок колонок. Заблокированные колонки (например, «Бэклог спринта» в Scrum)
        не могут быть перемещены — вернётся 400 с кодом `COLUMN_LOCKED`.

        После перестановки проверяется порядок типов: `initial → in_progress → completed`.
        При нарушении — 400 с кодом `INVALID_COLUMN_ORDER`, изменения откатываются.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardReorderColumnsRequest'
      responses:
        '204':
          description: Reordered
        '400':
          description: Column locked or invalid column order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /boards/{board_id}/columns/{column_id}:
    patch:
      tags: [Columns]
      summary: Update column
      description: |-
        При изменении `system_type` проверяется порядок колонок: `initial → in_progress → completed`.
        Заблокированные колонки нельзя переименовывать или менять `system_type`.
        При нарушении порядка — 400 с кодом `INVALID_COLUMN_ORDER`, изменения откатываются.

        Для колонок с `system_type = completed` установка `wip_limit` запрещена — 400.
        При смене `system_type` на `completed` WIP-лимит автоматически сбрасывается в null.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/ColumnIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnRequest'
      responses:
        '200':
          description: Updated column
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ColumnResponse'
        '400':
          description: Column locked or invalid column order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Columns]
      summary: Delete column
      description: |-
        Удаляет колонку. После удаления порядок оставшихся колонок пересчитывается последовательно (1, 2, 3, ...).

        **Ограничения:**
        - Нельзя удалить заблокированную колонку (`COLUMN_LOCKED`)
        - Нельзя удалить колонку, если в ней есть задачи (`COLUMN_HAS_TASKS`)
        - На доске должна остаться хотя бы одна колонка каждого типа: `initial`, `in_progress`, `completed` (`INVALID_COLUMN_ORDER`)
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/ColumnIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Column locked, has tasks, or would violate minimum type requirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

