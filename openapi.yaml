          description: Reordered

  /boards/{board_id}/fields/{field_id}:
    patch:
      tags: [BoardFields]
      summary: Update field
      description: |
        Updates an existing field.

        **System field restrictions (`is_system: true`):**
        - In general, system fields cannot be edited -- attempting to change
          `name`, `description`, or `is_required` returns `400 SYSTEM_FIELD`.
        - **Exception:** the system fields "Приоритизация" and "Оценка трудозатрат"
          allow updating the `options` array via PATCH.
          Example: `{ "options": ["Низкий", "Средний", "Высокий", "Критичный", "Блокер"] }`
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/FieldIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardCustomFieldRequest'
      responses:
        '200':
          description: Updated field
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BoardCustomFieldResponse'
    delete:
      tags: [BoardFields]
      summary: Delete field
      description: |
        Deletes a field. System fields (`is_system: true`) cannot be deleted --
        returns `400 SYSTEM_FIELD`.
      parameters:
        - $ref: '#/components/parameters/BoardIdPath'
        - $ref: '#/components/parameters/FieldIdPath'
      responses:
        '204':
          description: Deleted

