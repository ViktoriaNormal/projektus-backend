  # ─── Admin: System Roles ────────────────────────────────────────────
  /admin/roles:
    get:
      tags: [AdminRoles]
      summary: List system roles
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RoleResponse'
    post:
      tags: [AdminRoles]
      summary: Create system role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '200':
          description: Created role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'

  /admin/roles/{role_id}:
    get:
      tags: [AdminRoles]
      summary: Get system role
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
    put:
      tags: [AdminRoles]
      summary: Update system role
      description: |
        Системная роль с is_admin=true полностью неизменяема — нельзя менять имя, описание и права.
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Updated role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
        '403':
          description: System admin role is immutable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: SYSTEM_ADMIN_ROLE, message: "Системная роль администратора неизменяема" }
    delete:
      tags: [AdminRoles]
      summary: Delete system role
      description: |
        Системная роль с is_admin=true не может быть удалена.
        Роль, назначенная хотя бы одному пользователю, не может быть удалена.
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Deleted
        '400':
          description: Role has members assigned (ROLE_HAS_MEMBERS)
        '403':
          description: System admin role cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              example:
                success: false
                data: null
                error: { code: SYSTEM_ADMIN_ROLE, message: "Нельзя удалить системную роль администратора" }

