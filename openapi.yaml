openapi: 3.0.3
info:
  title: Projektus API
  version: 1.0.0
  description: >
    Backend API системы управления проектами Projektus, реализующей управление доступом,
    пользователями, проектами, рабочими процессами Scrum / Kanban, встречами, уведомлениями,
    аналитикой и администрированием в соответствии с функциональными требованиями.

servers:
  - url: http://localhost:8080/api
    description: Локальное окружение разработки

tags:
  - name: Auth
  - name: Users
  - name: Notifications
  - name: Projects
  - name: Boards
  - name: Tasks
  - name: Meetings
  - name: Scrum
  - name: Kanban
  - name: Analytics
  - name: Dashboards
  - name: Admin

paths:
  /v1/auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Пользователь успешно зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseRegister'
        '400':
          description: Ошибка валидации

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Аутентификация пользователя и выдача токена с ролями
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseLogin'
  /v1/admin/roles:
    get:
      tags: [Admin]
      summary: Получить список системных ролей
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список системных ролей
    post:
      tags: [Admin]
      summary: Создать новую системную роль
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Роль успешно создана

  /v1/admin/roles/{roleId}:
    get:
      tags: [Admin]
      summary: Получить системную роль по идентификатору
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: roleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Роль найдена
    put:
      tags: [Admin]
      summary: Обновить системную роль
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: roleId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Роль обновлена
    delete:
      tags: [Admin]
      summary: Удалить системную роль
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: roleId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Роль удалена

  /v1/admin/users/{userId}/roles:
    get:
      tags: [Admin]
      summary: Получить системные роли пользователя
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список системных ролей пользователя
    post:
      tags: [Admin]
      summary: Назначить системные роли пользователю
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Роли пользователя обновлены
        '401':
          description: Неверные учетные данные
        '429':
          description: Пользователь или IP-адрес временно заблокированы из-за неудачных попыток входа

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access токена по refresh токену
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Токены успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseRefresh'
        '401':
          description: Недействительный или отозванный refresh токен

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Выход из системы (инвалидация refresh токена)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: Выход выполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseMessage'

  /v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Смена пароля текущего пользователя с проверкой политики
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Пароль изменен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseMessage'
        '400':
          description: Пароль не соответствует политике или неверен старый пароль
        '401':
          description: Неавторизовано

  /users:
    get:
      tags: [Users]
      summary: Поиск пользователей в организации
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Поиск по логину, e-mail или полному имени
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseUserList'

  /users/{id}:
    get:
      tags: [Users]
      summary: Получить профиль пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseUser'
        '404':
          description: Не найдено

    patch:
      tags: [Users]
      summary: Обновить личный профиль (самостоятельно или администратором)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: Обновленный профиль пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseUser'
        '403':
          description: Доступ запрещен
        '404':
          description: Не найдено

  /users/{id}/avatar:
    put:
      tags: [Users]
      summary: Загрузить или изменить аватар пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Аватар обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseUser'
        '400':
          description: Некорректный файл

  /notifications/settings:
    get:
      tags: [Notifications]
      summary: Получить настройки уведомлений текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Настройки уведомлений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationSetting'

    put:
      tags: [Notifications]
      summary: Полностью заменить настройки уведомлений текущего пользователя
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/NotificationSettingUpdate'
      responses:
        '204':
          description: Настройки обновлены

  /notifications:
    get:
      tags: [Notifications]
      summary: Получить ленту внутрисистемных уведомлений
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: unreadOnly
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Список уведомлений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

  /v1/projects:
    get:
      tags: [Projects]
      summary: Список проектов, к которым есть доступ у текущего пользователя
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, archived, paused]
        - in: query
          name: type
          schema:
            type: string
            enum: [scrum, kanban]
      responses:
        '200':
          description: Список проектов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectList'

    post:
      tags: [Projects]
      summary: Создать проект
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '200':
          description: Проект создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProject'
        '400':
          description: Ошибка валидации

  /v1/projects/{projectId}:
    get:
      tags: [Projects]
      summary: Получить проект по идентификатору
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Проект
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProject'
        '404':
          description: Не найдено

    patch:
      tags: [Projects]
      summary: Обновить параметры проекта
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Обновленный проект
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProject'

    delete:
      tags: [Projects]
      summary: Безвозвратно удалить проект (с подтверждением)
      description: Требует явного флага подтверждения для предотвращения случайного удаления.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - in: query
          name: confirm
          required: true
          schema:
            type: boolean
      responses:
        '204':
          description: Удалено
        '400':
          description: Нет подтверждения

  /v1/projects/{projectId}/members:
    get:
      tags: [Projects]
      summary: Список участников проекта
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Участники
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectMemberList'

    post:
      tags: [Projects]
      summary: Добавить участника в проект
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProjectMemberRequest'
      responses:
        '200':
          description: Участник добавлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectMember'

  /v1/projects/{projectId}/members/{memberId}:
    delete:
      tags: [Projects]
      summary: Удалить участника из проекта
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ProjectMemberId'
      responses:
        '200':
          description: Участник удален
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseMessage'

    patch:
      tags: [Projects]
      summary: Изменить роли участника проекта
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/ProjectMemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectMemberRolesRequest'
      responses:
        '200':
          description: Участник обновлен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectMember'

  /projects/{projectId}/history:
    get:
      tags: [Projects]
      summary: Получить историю изменений проекта
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Записи истории
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectHistoryEntry'

  /v1/admin/project-templates:
    get:
      tags: [Admin]
      summary: Список шаблонов проектов
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Шаблоны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectTemplateList'
    post:
      tags: [Admin]
      summary: Создать шаблон проекта
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectTemplateRequest'
      responses:
        '200':
          description: Шаблон создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponseProjectTemplate'

  /boards:
    get:
      tags: [Boards]
      summary: Список досок в рамках проекта
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Доски
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Board'

    post:
      tags: [Boards]
      summary: Создать доску в проекте
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBoardRequest'
      responses:
        '201':
          description: Доска создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'

  /boards/{boardId}:
    get:
      tags: [Boards]
      summary: Получить детали доски
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      responses:
        '200':
          description: Доска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'

    patch:
      tags: [Boards]
      summary: Обновить доску
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBoardRequest'
      responses:
        '200':
          description: Обновленная доска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'

    delete:
      tags: [Boards]
      summary: Удалить доску
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      responses:
        '204':
          description: Удалено

  /boards/{boardId}/columns:
    get:
      tags: [Boards]
      summary: Список колонок на доске
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      responses:
        '200':
          description: Колонки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Column'

    post:
      tags: [Boards]
      summary: Добавить колонку на доску
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
      responses:
        '201':
          description: Колонка создана, переходы статусов проекта обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'

  /boards/{boardId}/swimlanes:
    get:
      tags: [Boards]
      summary: Список дорожек (swimlanes) на доске
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      responses:
        '200':
          description: Дорожки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Swimlane'

    post:
      tags: [Boards]
      summary: Добавить дорожку на доску
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSwimlaneRequest'
      responses:
        '201':
          description: Дорожка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Swimlane'

  /boards/{boardId}/notes:
    get:
      tags: [Boards]
      summary: Список заметок на доске (по колонкам / дорожкам)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      responses:
        '200':
          description: Заметки
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Note'

    post:
      tags: [Boards]
      summary: Добавить заметку на доску
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BoardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Заметка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Note'

  /tasks:
    get:
      tags: [Tasks]
      summary: Поиск и список задач
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: projectId
          schema:
            type: string
            format: uuid
        - in: query
          name: ownerId
          schema:
            type: string
            format: uuid
        - in: query
          name: executorId
          schema:
            type: string
            format: uuid
        - in: query
          name: columnId
          schema:
            type: string
      responses:
        '200':
          description: Задачи
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'

    post:
      tags: [Tasks]
      summary: Создать задачу с автоматически сгенерированным ключом
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Задача создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Получить подробную информацию о задаче
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Задача с полными деталями
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetails'
        '404':
          description: Не найдено

    patch:
      tags: [Tasks]
      summary: Обновить параметры задачи
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Обновленная задача
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

    delete:
      tags: [Tasks]
      summary: Удалить задачу с обязательным указанием причины
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteTaskRequest'
      responses:
        '204':
          description: Удалено

  /tasks/{taskId}/dependencies:
    get:
      tags: [Tasks]
      summary: Список зависимостей задачи
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Зависимости
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskDependency'

