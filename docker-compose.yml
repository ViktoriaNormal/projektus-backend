version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: projektus_postgres
    environment:
      POSTGRES_DB: projektus
      POSTGRES_USER: projektus
      POSTGRES_PASSWORD: projektus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projektus -d projektus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
